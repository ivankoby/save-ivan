<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 420 420">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde0" stop-opacity="1"/>
      <stop offset="40%" stop-color="#fff54f" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fff54f" stop-opacity="0"/>
    </radialGradient>
    <g id="sparkle">
      <circle r="7" fill="url(#glow)"/>
      <path d="M0,-30 L3,-4 L30,0 L3,4 L0,30 L-3,4 L-30,0 L-3,-4 Z" fill="#fff54f"/>
      <path d="M0,-16 L1.6,-1.6 L16,0 L1.6,1.6 L0,16 L-1.6,1.6 L-16,0 L-1.6,-1.6 Z" fill="#fffde0"/>
    </g>
    <g id="sparkle-sm">
      <circle r="4" fill="url(#glow)"/>
      <path d="M0,-14 L1.4,-1.8 L14,0 L1.4,1.8 L0,14 L-1.4,1.8 L-14,0 L-1.4,-1.8 Z" fill="#fff54f"/>
    </g>
    <g id="sparkle-xs">
      <circle r="2" fill="#fff54f" opacity="0.9"/>
    </g>
  </defs>

  <rect width="420" height="420" fill="#1ba11a"/>

  <use href="#sparkle" transform="translate(80,70) scale(0.9)"/>
  <use href="#sparkle" transform="translate(320,220) scale(0.85)"/>
  <use href="#sparkle" transform="translate(180,340) scale(0.8)"/>

  <use href="#sparkle-sm" transform="translate(260,90)"/>
  <use href="#sparkle-sm" transform="translate(70,250)"/>
  <use href="#sparkle-sm" transform="translate(370,360)"/>

  <use href="#sparkle-xs" transform="translate(200,150)"/>
  <use href="#sparkle-xs" transform="translate(360,40)"/>
  <use href="#sparkle-xs" transform="translate(40,380)"/>
</svg>
